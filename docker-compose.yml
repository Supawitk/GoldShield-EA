version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: goldshield-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-goldshield}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-goldshield_dev}
      POSTGRES_DB: ${DB_NAME:-goldshield}
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-goldshield}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
